version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fit-postgres
    environment:
      POSTGRES_USER: fituser
      POSTGRES_PASSWORD: fitpass123
      POSTGRES_DB: fit_saas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fituser -d fit_saas"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fit-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: fit-backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app/backend
      - ./alembic:/app/alembic
    environment:
      - DATABASE_URL=postgresql://fituser:fitpass123@postgres:5432/fit_saas
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  celery:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: fit-celery
    command: celery -A backend.worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app/backend
    environment:
      - DATABASE_URL=postgresql://fituser:fitpass123@postgres:5432/fit_saas
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: fit-celery-beat
    command: celery -A backend.worker.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app/backend
    environment:
      - DATABASE_URL=postgresql://fituser:fitpass123@postgres:5432/fit_saas
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20-alpine
    container_name: fit-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: npm run dev
    ports:
      - "3000:3000"
    profiles:
      - frontend

volumes:
  postgres_data: